# Development Profile Configuration

# H2 In-Memory Database (for local development and testing)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring Cache with Caffeine
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s,recordStats

# Logging
logging.level.com.springbootlearning.learningspringboot=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Enable SQL initialization with H2 compatible file
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-h2.sql

# JWT Configuration
jwt.secret=bXlTdXBlclNlY3JldEtleTIwMjRFbmhhbmNlZFNlY3VyaXR5S2V5MTIzNDU2Nzg5MA==
jwt.expiration=86400000

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans,configprops,loggers,threaddump,heapdump
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.info.env.enabled=true

# Application Info
info.app.name=Heroes & Villains API
info.app.description=Spring Boot Backend for Heroes, Villains and Anti-Heroes Management
info.app.version=1.0.0
info.app.author=Georges
