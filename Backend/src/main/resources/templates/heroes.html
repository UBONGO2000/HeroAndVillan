<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{base :: layout(
          pageTitle = 'Héros - Heroes & Villains',
          currentPage = 'heroes',
          content = ~{::content},
          pageStyles = ~{::styles},
          pageScripts = ~{::scripts}
      )}">
<head>
    <th:block th:fragment="styles">
        <style>
            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--space-6);
            }
            
            .page-title {
                font-size: var(--text-2xl);
                font-weight: 700;
                color: var(--gray-800);
            }
            
            .filter-bar {
                background: white;
                border-radius: var(--radius-lg);
                padding: var(--space-4);
                margin-bottom: var(--space-5);
                box-shadow: var(--shadow);
                display: flex;
                gap: var(--space-4);
                flex-wrap: wrap;
                align-items: center;
            }
            
            .characters-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: var(--space-5);
            }
            
            .character-card {
                height: 100%;
            }
            
            .character-actions {
                display: flex;
                gap: var(--space-2);
                margin-top: var(--space-4);
                padding-top: var(--space-4);
                border-top: 1px solid var(--gray-100);
            }
            
            .rating {
                display: flex;
                align-items: center;
                gap: var(--space-1);
                color: #f59e0b;
            }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <i class="fas fa-mask text-primary me-2"></i>
                    Les Héros
                </h1>
                <p class="text-gray-500 mt-1" th:text="${heroes != null} ? ${heroes.size()} + ' héros trouvés' : '0 héros'">0 héros</p>
            </div>
            <a href="/heroes/new" class="btn btn-primary btn-lg">
                <i class="fas fa-plus me-2"></i>
                Nouveau Héros
            </a>
        </div>
        
        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="form-group mb-0" style="flex: 1; max-width: 300px;">
                <div class="position-relative">
                    <i class="fas fa-search position-absolute" style="left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400);"></i>
                    <input type="text" id="hero-search" class="form-control" placeholder="Rechercher un héros..." style="padding-left: 40px;">
                </div>
            </div>
            
            <select class="form-control mb-0" style="width: 200px;">
                <option value="">Toutes les catégories</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Catégorie</option>
            </select>
            
            <select class="form-control mb-0" style="width: 150px;">
                <option value="">Trier par</option>
                <option value="name">Nom</option>
                <option value="rating">Note</option>
                <option value="date">Date d'ajout</option>
            </select>
        </div>
        
        <!-- Heroes Grid -->
        <div class="characters-grid" th:if="${heroes != null and !heroes.isEmpty()}">
            <div th:each="hero : ${heroes}" class="character-card hero">
                <div class="character-image">
                    <i class="fas fa-mask"></i>
                </div>
                <div class="character-content">
                    <span class="character-type hero">
                        <i class="fas fa-mask"></i> Héros
                    </span>
                    
                    <h3 class="character-name" th:text="${hero.heroName}">Nom du Héros</h3>
                    
                    <p class="character-description" th:text="${hero.power} ?: 'Aucun pouvoir spécifié'">
                        Description du pouvoir...
                    </p>
                    
                    <div class="d-flex align-items-center gap-3 mt-3">
                        <span class="badge badge-info" th:if="${hero.affiliation}" th:text="${hero.affiliation}">
                            Affiliation
                        </span>
                        <div class="rating" th:if="${hero.rating != null}">
                            <i class="fas fa-star"></i>
                            <span th:text="${hero.rating}">5.0</span>
                        </div>
                    </div>
                    
                    <div class="character-actions">
                        <a th:href="@{/heroes/{id}(id=${hero.id})}" class="btn btn-primary flex-fill">
                            <i class="fas fa-eye me-1"></i> Voir
                        </a>
                        <a th:href="@{/heroes/{id}/edit(id=${hero.id})}" class="btn btn-secondary">
                            <i class="fas fa-edit"></i>
                        </a>
                        <button class="btn btn-danger" 
                                th:data-delete="${hero.heroName}"
                                th:data-url="@{/api/heroes/{id}(id=${hero.id})}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div class="empty-state" th:if="${heroes == null or heroes.isEmpty()}">
            <div class="empty-state-icon">
                <i class="fas fa-mask"></i>
            </div>
            <h3>Aucun héros trouvé</h3>
            <p>Commencez par ajouter votre premier héros à la collection.</p>
            <a href="/heroes/new" class="btn btn-primary btn-lg">
                <i class="fas fa-plus me-2"></i>
                Ajouter un Héros
            </a>
        </div>
        
        <!-- Pagination -->
        <nav class="mt-5" th:if="${totalPages != null and totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/heroes(page=${currentPage - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/heroes(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/heroes(page=${currentPage + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </th:block>
    
    <th:block th:fragment="scripts">
        <script>
            // Client-side search filtering
            document.getElementById('hero-search')?.addEventListener('input', debounce(function(e) {
                const searchTerm = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.character-card');
                
                cards.forEach(card => {
                    const name = card.querySelector('.character-name').textContent.toLowerCase();
                    const description = card.querySelector('.character-description').textContent.toLowerCase();
                    
                    if (name.includes(searchTerm) || description.includes(searchTerm)) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }, 300));
        </script>
    </th:block>
</body>
</html>
