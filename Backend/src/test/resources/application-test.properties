# Test Profile Configuration

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable SQL initialization for tests
spring.sql.init.mode=never

# JWT Configuration (shorter expiration for tests)
jwt.secret=testSecretKeyForTestingOnly1234567890123456789012345678901234=
jwt.expiration=3600000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.springbootlearning.learningspringboot=DEBUG

# Disable cache for tests
spring.cache.type=none
